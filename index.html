<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beautiful Creation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Nunito', 'Noto Sans TC', sans-serif;
  }

  #bg {
    position: fixed; inset: 0;
    background: url('Slideshows/cover_page.jpg') center center / cover no-repeat;
    z-index: 0;
  }
  #overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 1;
  }

  #content {
    position: relative; z-index: 2;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%;
    padding: 32px 24px;
    gap: 24px;
    text-align: center;
  }

  .title-en {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.4rem, 7vw, 4.8rem);
    color: #fff;
    text-shadow: 2px 3px 12px rgba(0,0,0,0.7);
    line-height: 1.1;
  }
  .title-zh {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: clamp(1.2rem, 3.5vw, 2.2rem);
    color: #ffe;
    font-weight: 700;
    text-shadow: 1px 2px 8px rgba(0,0,0,0.7);
    margin-top: -12px;
  }

  .preface {
    max-width: 640px;
    background: rgba(0,0,0,0.38);
    backdrop-filter: blur(6px);
    border-radius: 16px;
    padding: 20px 28px;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .preface-en {
    font-size: clamp(0.92rem, 2vw, 1.15rem);
    color: #fff;
    font-weight: 600;
    line-height: 1.65;
    margin-bottom: 12px;
  }
  .preface-zh {
    font-size: clamp(0.85rem, 1.8vw, 1.05rem);
    color: #ffe;
    font-weight: 400;
    line-height: 1.8;
  }

  /* Version selector row */
  .selector-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(0,0,0,0.38);
    backdrop-filter: blur(6px);
    border-radius: 50px;
    padding: 10px 18px;
    border: 1px solid rgba(255,255,255,0.25);
  }
  .selector-label {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  #version-select {
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: #333;
    background: #fff;
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    outline: none;
    min-width: 80px;
  }
  #go-btn {
    display: flex; align-items: center; justify-content: center;
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.92);
    border: none; border-radius: 50%;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    flex-shrink: 0;
  }
  #go-btn:hover { background: #fff; transform: scale(1.1); }
  #go-btn svg { width: 20px; height: 20px; }

  #loading-msg {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.55);
    font-style: italic;
  }
  #doc-btn, #puzzle-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 38px; height: 38px;
    background: rgba(255,255,255,0.18);
    border: 2px solid rgba(255,255,255,0.35);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    flex-shrink: 0;
  }
  #doc-btn:hover, #puzzle-btn:hover { background: rgba(255,255,255,0.35); border-color: rgba(255,255,255,0.7); }
  #doc-btn.disabled, #puzzle-btn.disabled { opacity: 0.3; pointer-events: none; cursor: default; }
  #doc-btn svg, #puzzle-btn svg { width: 20px; height: 20px; }
</style>
</head>
<body>

<div id="bg"></div>
<div id="overlay"></div>

<div id="content">
  <div>
    <div class="title-en">Beautiful Creation</div>
    <div class="title-zh">美麗的創造</div>
  </div>

  <div class="preface">
    <div class="preface-en">We live in a beautiful world! Just look at the amazing things around you. Let's go back to the beginning and see what the Bible tells us about how it all began.</div>
    <div class="preface-zh">我們生活在一個美麗的世界，看你身邊那些奇妙的事物，就知道了。來看看聖經告訴我們這世界是如何起源的。</div>
  </div>

  <div class="selector-row">
    <span class="selector-label">Version</span>
    <select id="version-select">
      <option value="">Loading...</option>
    </select>
    <a id="doc-btn" class="disabled" href="#" target="_blank" title="Open Lesson Plan">
      <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
    </a>
    <a id="puzzle-btn" class="disabled" href="#" target="_blank" title="Open Word Puzzle">
      <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
    </a>
    <button id="go-btn" title="Begin">
      <svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>
  </div>

  <div id="loading-msg">Detecting available versions...</div>
</div>

<script>
// Scan versions 1-99, add to dropdown only if data.js loads
var maxVersion = 99;
var found = [];
var checked = 0;

// Cache of checked file URLs per version, keyed by filename
var fileUrlCache = {};

function updateLinkBtn(v, btnId, filename) {
  var btn = document.getElementById(btnId);
  if (!btn) return;
  if (!v) { applyDocBtn(btn, null); return; }
  var cacheKey = btnId + ':' + v;
  if (fileUrlCache[cacheKey] !== undefined) { applyDocBtn(btn, fileUrlCache[cacheKey]); return; }
  var url = v + '/' + filename;
  fetch(url, { method: 'HEAD' })
    .then(function(res) {
      var resolved = res.ok ? url : null;
      fileUrlCache[cacheKey] = resolved;
      applyDocBtn(btn, resolved);
    })
    .catch(function() {
      fileUrlCache[cacheKey] = null;
      applyDocBtn(btn, null);
    });
}

function updateDocBtn(v) {
  updateLinkBtn(v, 'doc-btn', 'lesson_plan.pdf');
  updateLinkBtn(v, 'puzzle-btn', 'word_puzzle.pdf');
}

function applyDocBtn(btn, url) {
  if (url) { btn.href = url; btn.classList.remove('disabled'); }
  else { btn.href = '#'; btn.classList.add('disabled'); }
}

function buildDropdown() {
  var select = document.getElementById('version-select');
  var msg = document.getElementById('loading-msg');
  select.innerHTML = '';
  if (found.length === 0) {
    select.innerHTML = '<option value="">No versions found</option>';
    msg.textContent = 'No version data found. Please check your setup.';
    return;
  }
  found.sort(function(a, b) { return a - b; });
  found.forEach(function(v) {
    var opt = document.createElement('option');
    opt.value = v;
    opt.textContent = v;
    select.appendChild(opt);
  });

  // Restore last selection from localStorage
  var saved = localStorage.getItem('vbs_version');
  if (saved && found.indexOf(parseInt(saved)) > -1) {
    select.value = saved;
  }
  updateDocBtn(select.value);
  msg.textContent = found.length + ' version' + (found.length > 1 ? 's' : '') + ' available.';

  // Persist selection on change
  select.addEventListener('change', function() {
    localStorage.setItem('vbs_version', this.value);
    updateDocBtn(this.value);
  });
}

function checkVersion(v) {
  // Use fetch to test if data.js exists for this version
  fetch(v + '/data.js', { method: 'HEAD' })
    .then(function(res) {
      if (res.ok) found.push(v);
    })
    .catch(function() {})
    .finally(function() {
      checked++;
      if (checked === maxVersion) buildDropdown();
    });
}

for (var i = 1; i <= maxVersion; i++) {
  checkVersion(i);
}

document.getElementById('go-btn').addEventListener('click', function() {
  var v = document.getElementById('version-select').value;
  if (v) {
    localStorage.setItem('vbs_version', v);
    window.location.href = 'slideshow.html?v=' + v;
  }
});

// Also allow pressing Enter on the select
document.getElementById('version-select').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    var v = this.value;
    if (v) {
      localStorage.setItem('vbs_version', v);
      window.location.href = 'slideshow.html?v=' + v;
    }
  }
});
</script>
</body>
</html>
