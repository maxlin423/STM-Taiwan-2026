<meta charset="UTF-8">

<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root { --nav-height: 68px; }

  html, body {

  }

  .slide {

    position: absolute;
    inset: 0;
    bottom: var(--nav-height);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }
  .slide.active { display: flex; flex-direction: column; }

  .slide-title { justify-content: space-between; padding: 32px 40px 20px; }
  .title-day {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 5vw, 3.6rem);
    color: #fff;
    text-shadow: 2px 3px 8px rgba(0,0,0,0.7);
    line-height: 1.15;
  }
  .title-verse-block {
    background: rgba(0,0,0,0.42);
    border-radius: 14px;
    padding: 14px 20px;
    backdrop-filter: blur(4px);
  }
  .title-verse-en { font-size: clamp(0.95rem,2.2vw,1.3rem); color:#fff; font-weight:700; line-height:1.4; }
  .title-verse-zh { font-size: clamp(0.85rem,2vw,1.15rem); color:#ffe; font-weight:400; line-height:1.4; margin-top:4px; }
  .title-vocab {
    font-size: clamp(0.7rem,1.5vw,0.95rem);
    color: #fff;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
    font-weight: 700;
    letter-spacing: 0.02em;
    line-height: 1.7;
    word-spacing: 0.3em;
  }

  /* ── VERSE SLIDE ── */
  .slide-verse { flex-direction: column; }

  .verse-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.38); }

  .verse-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 14px 24px 14px;
    gap: 8px;
  }

  /* MAIN TEXT — fixed 60% height, font auto-fits via JS */
  .main-text {
    flex: 0 0 60%;
    padding: 16px 20px;
    border-radius: 14px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(6px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
    min-height: 0;
  }
  .main-text .label {
    font-size: clamp(0.58rem,1.2vw,0.75rem);
    font-weight: 800;
    color: #ffe;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 6px;
    opacity: 0.85;
    flex-shrink: 0;
  }
  .main-text .text-en {
    font-family: 'Fredoka One', cursive;
    font-size: 2.6rem; /* set by JS fitMainText */
    color: #fff;
    text-shadow: 1px 2px 6px rgba(0,0,0,0.5);
    line-height: 1.2;
  }
  .main-text .text-zh {
    font-size: 1.7rem; /* set by JS fitMainText */
    color: #ffe;
    font-weight: 700;
    line-height: 1.4;
    margin-top: 4px;
  }

  .vocab-section {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
    padding: 2px 0;
    min-height: 0;
  }
  .vocab-chip {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(0.82rem,1.7vw,1.05rem);
    color: #333;
    background: rgba(255,255,255,0.92);
    border-radius: 20px;
    padding: 5px 13px;
    border: 2px solid transparent;
    transition: all 0.2s ease;
    user-select: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 5px;

  .chip-zh { font-family: 'Noto Sans TC', sans-serif; font-size: 0.88em; font-weight: 700; opacity: 0.75; }

  .sub-text {
    flex: 0 0 auto;
    max-height: 26%;
    overflow-y: auto;
    cursor: pointer;
    padding: 10px 16px;
    border-radius: 14px;
    background: rgba(0,0,0,0.38);
    backdrop-filter: blur(6px);
    border: 2px solid rgba(255,255,255,0.25);
    position: relative;
    min-height: 0;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.3) transparent;

  .sub-text::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 4px; }
  .sub-text:hover { background: rgba(0,0,0,0.50); border-color: rgba(255,255,255,0.5); }
  .sub-text .tap-hint {
    position: absolute; top: 7px; right: 10px;
    font-size: 0.62rem; color: rgba(255,255,255,0.45);
    font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;

  .sub-text .label {
    font-size: clamp(0.58rem,1.2vw,0.75rem);
    font-weight: 800; color: #ffd;

  .sub-text .text-en { font-size: clamp(0.82rem,1.8vw,1.15rem); color:#fff; font-weight:700; line-height:1.45; }
  .sub-text .text-zh { font-size: clamp(0.75rem,1.6vw,1rem); color:#ffe; font-weight:400; line-height:1.45; margin-top:3px; }

  /* HIGHLIGHTS */
  .hl { border-radius: 3px; padding: 0 1px; transition: background 0.2s; }

  /* ── NAV BAR ── */
  #nav-bar {
    position: fixed; bottom:0; left:0; right:0;
    height: var(--nav-height);
    background: rgba(20,20,30,0.92);
    backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    padding: 0 16px; z-index: 100;
  }
  .nav-center {
    display: flex; align-items: center; gap: 14px;
    position: absolute; left: 50%; transform: translateX(-50%);
  }
  .nav-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem; color: #fff;
    background: rgba(255,255,255,0.15);
    border: none; border-radius: 10px;
    padding: 8px 22px; cursor: pointer;
    transition: background 0.2s; user-select: none;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.28); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  #page-indicator {
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem; color: rgba(255,255,255,0.7);
    font-weight: 700; min-width: 52px; text-align: center;

  .nav-days { position: absolute; right: 16px; display: flex; gap: 8px; align-items: center; }
  .day-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 0.95rem; color: #fff;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 50%; width: 36px; height: 36px;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    user-select: none;
  }

  .day-btn.current-day { background: rgba(255,220,80,0.4); border-color: #ffd84f; color: #ffd84f; }
</style>

        verseEn: 'Thus the heavens and the earth were finished, and all the host of them. And on the seventh day God finished his work that he had done, and he rested on the seventh day from all his work that he had done.',
        verseZh: '天地萬物都造齊了。到第七日，神造物的工已經完畢，就在第七日歇了他一切的工，安息了。',
        vocab: ['REST','FINISH']
      },
      {
        ref: 'Genesis 2:3',
        image: 'Slideshows/Day4/Genesis_2-3.jpeg',
        keyEn: 'God made the seventh day holy.',
        keyZh: '神使第七日成為聖日。',
        verseEn: 'So God blessed the seventh day and made it holy, because on it God rested from all his work that he had done in creation.',
        verseZh: '神賜福給第七日，定為聖日，因為在這日神歇了他一切創造的工，就安息了。',
        vocab: ['REST','HOLY']
      }
    ]
  }
];


// ─────────────────────────────────────────────
// BUILD FLAT SLIDES ARRAY
// ─────────────────────────────────────────────
const slides = [];
const dayStartIndices = [];
days.forEach((day, di) => {
  dayStartIndices.push(slides.length);
  slides.push({ type: 'title', dayIndex: di, data: day.titleSlide });
  day.verseSlides.forEach(vs => slides.push({ type: 'verse', dayIndex: di, data: vs }));
});
const total = slides.length;
let current = 0;

// ─────────────────────────────────────────────
// HIGHLIGHT — substring matching
// ─────────────────────────────────────────────
function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function highlightText(text, activeWords) {
  if (!activeWords || activeWords.length === 0) return text;
  const sorted = [...activeWords].sort((a, b) => b.length - a.length);
  let result = text;
  sorted.forEach(word => {
    const color = VOCAB_COLORS[word];
    const zh = VOCAB_ZH[word];
    const reEn = new RegExp(escapeRegex(word), 'gi');
    result = result.replace(reEn, m => '<span class="hl" style="background:' + color + '">' + m + '</span>');
    if (zh) {
      const reZh = new RegExp(escapeRegex(zh), 'g');
      result = result.replace(reZh, m => '<span class="hl" style="background:' + color + '">' + m + '</span>');
    }
  });
  return result;
}

// ─────────────────────────────────────────────
// AUTO-FIT FONT FOR MAIN TEXT
// ─────────────────────────────────────────────
function fitMainText(slideEl) {
  const mainEl = slideEl.querySelector('.main-text');
  if (!mainEl) return;
  const enEl = mainEl.querySelector('.text-en');
  const zhEl = mainEl.querySelector('.text-zh');
  if (!enEl) return;
  let enSize = 2.8;
  const minSize = 0.85;
  enEl.style.fontSize = enSize + 'rem';
  if (zhEl) zhEl.style.fontSize = (enSize * 0.62) + 'rem';
  while (enSize > minSize && mainEl.scrollHeight > mainEl.clientHeight) {
    enSize = Math.round((enSize - 0.1) * 10) / 10;
    enEl.style.fontSize = enSize + 'rem';
    if (zhEl) zhEl.style.fontSize = (enSize * 0.62) + 'rem';
  }
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
const container = document.getElementById('slideshow');

function buildTitleSlide(s, idx) {
  const d = s.data;
  const div = document.createElement('div');
  div.className = 'slide slide-title';
  div.style.backgroundImage = "url('" + d.image + "')";
  div.dataset.slideIndex = idx;
  const vocabStr = d.vocab.map(w => w + ' ' + VOCAB_ZH[w]).join('  ·  ');
  div.innerHTML =
    '<div class="title-day">' + d.title + '</div>' +
    '<div class="title-verse-block">' +
      '<div class="title-verse-en">' + d.verseEn + '</div>' +
      '<div class="title-verse-zh">' + d.verseZh + '</div>' +
    '</div>' +
    '<div class="title-vocab">' + vocabStr + '</div>';
  return div;
}

function buildVerseSlide(s, idx) {
  const d = s.data;
  const div = document.createElement('div');
  div.className = 'slide slide-verse';
  div.style.backgroundImage = "url('" + d.image + "')";
  div.dataset.slideIndex = idx;
  div.dataset.swapped = 'false';
  div.dataset.activeVocab = '[]';

  const chipsHtml = d.vocab.map(function(w) {
    return '<div class="vocab-chip" data-word="' + w + '">' +
      '<span class="chip-en">' + w + '</span>' +
      '<span class="chip-zh">' + VOCAB_ZH[w] + '</span></div>';
  }).join('');

  div.innerHTML =
    '<div class="verse-overlay"></div>' +
    '<div class="verse-content">' +
      '<div class="main-text">' +
        '<div class="label">' + d.ref + ' \u2014 Key Thought</div>' +
        '<div class="text-en key-en">' + d.keyEn + '</div>' +
        '<div class="text-zh key-zh">' + d.keyZh + '</div>' +
      '</div>' +
      '<div class="vocab-section">' + chipsHtml + '</div>' +
      '<div class="sub-text">' +
        '<span class="tap-hint">tap to swap</span>' +
        '<div class="label">' + d.ref + ' \u2014 Bible Verse</div>' +
        '<div class="text-en verse-en">' + d.verseEn + '</div>' +
        '<div class="text-zh verse-zh">' + d.verseZh + '</div>' +
      '</div>' +
    '</div>';

  // Swap handler on sub-text only
  div.querySelector('.sub-text').addEventListener('click', function() {
    toggleSwap(idx);
  });

  // Chip handlers — stop propagation
  div.querySelectorAll('.vocab-chip').forEach(function(chip) {
    chip.addEventListener('click', function(e) {
      e.stopPropagation();
      toggleVocab(chip, idx);
    });
  });

  return div;
}

slides.forEach(function(s, idx) {
  container.appendChild(s.type === 'title' ? buildTitleSlide(s, idx) : buildVerseSlide(s, idx));
});

// ─────────────────────────────────────────────
// VOCAB TOGGLE
// ─────────────────────────────────────────────
function toggleVocab(chipEl, slideIdx) {
  const word = chipEl.dataset.word;
  const slideEl = document.querySelector('.slide[data-slide-index="' + slideIdx + '"]');
  let active = JSON.parse(slideEl.dataset.activeVocab);
  if (active.includes(word)) {
    active = active.filter(function(w) { return w !== word; });
    chipEl.classList.remove('active');
  } else {
    active.push(word);
    chipEl.classList.add('active');
  }
  slideEl.dataset.activeVocab = JSON.stringify(active);
  applyHighlights(slideEl, active);
}

function applyHighlights(slideEl, activeWords) {
  const idx = parseInt(slideEl.dataset.slideIndex);
  const d = slides[idx].data;
  const isSwapped = slideEl.dataset.swapped === 'true';
  const mainEnEl = slideEl.querySelector('.key-en');
  const mainZhEl = slideEl.querySelector('.key-zh');
  const subEnEl  = slideEl.querySelector('.verse-en');
  const subZhEl  = slideEl.querySelector('.verse-zh');
  if (isSwapped) {
    mainEnEl.innerHTML = highlightText(d.verseEn, activeWords);
    mainZhEl.innerHTML = highlightText(d.verseZh, activeWords);
    subEnEl.innerHTML  = highlightText(d.keyEn, activeWords);
    subZhEl.innerHTML  = highlightText(d.keyZh, activeWords);
  } else {
    mainEnEl.innerHTML = highlightText(d.keyEn, activeWords);
    mainZhEl.innerHTML = highlightText(d.keyZh, activeWords);
    subEnEl.innerHTML  = highlightText(d.verseEn, activeWords);
    subZhEl.innerHTML  = highlightText(d.verseZh, activeWords);
  }
}

// ─────────────────────────────────────────────
// SWAP TOGGLE
// ─────────────────────────────────────────────
function toggleSwap(slideIdx) {
  const slideEl = document.querySelector('.slide[data-slide-index="' + slideIdx + '"]');
  const d = slides[slideIdx].data;
  const isSwapped = slideEl.dataset.swapped === 'true';
  const newSwapped = !isSwapped;
  slideEl.dataset.swapped = newSwapped ? 'true' : 'false';
  const active = JSON.parse(slideEl.dataset.activeVocab);
  const mainLabel = slideEl.querySelector('.main-text .label');
  const subLabel  = slideEl.querySelector('.sub-text .label');
  if (newSwapped) {
    mainLabel.textContent = d.ref + ' \u2014 Bible Verse';
    subLabel.textContent  = d.ref + ' \u2014 Key Thought';
    slideEl.querySelector('.key-en').innerHTML   = highlightText(d.verseEn, active);
    slideEl.querySelector('.key-zh').innerHTML   = highlightText(d.verseZh, active);
    slideEl.querySelector('.verse-en').innerHTML = highlightText(d.keyEn, active);
    slideEl.querySelector('.verse-zh').innerHTML = highlightText(d.keyZh, active);
  } else {
    mainLabel.textContent = d.ref + ' \u2014 Key Thought';
    subLabel.textContent  = d.ref + ' \u2014 Bible Verse';
    slideEl.querySelector('.key-en').innerHTML   = highlightText(d.keyEn, active);
    slideEl.querySelector('.key-zh').innerHTML   = highlightText(d.keyZh, active);
    slideEl.querySelector('.verse-en').innerHTML = highlightText(d.verseEn, active);
    slideEl.querySelector('.verse-zh').innerHTML = highlightText(d.verseZh, active);
  }
  requestAnimationFrame(function() { fitMainText(slideEl); });
}

// ─────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────
function showSlide(idx) {
  document.querySelectorAll('.slide').forEach(function(el) { el.classList.remove('active'); });
  const slideEl = document.querySelector('.slide[data-slide-index="' + idx + '"]');
  slideEl.classList.add('active');
  current = idx;
  document.getElementById('page-indicator').textContent = (idx + 1) + ' / ' + total;
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === total - 1;
  const dayBtns = document.querySelectorAll('.day-btn');
  const currentDay = slides[idx].dayIndex;
  dayBtns.forEach(function(btn, i) { btn.classList.toggle('current-day', i === currentDay); });
  if (slides[idx].type === 'verse') {
    requestAnimationFrame(function() { fitMainText(slideEl); });
  }
}

function goToDay(dayIdx) { showSlide(dayStartIndices[dayIdx]); }

document.getElementById('btn-prev').addEventListener('click', function() { if (current > 0) showSlide(current - 1); });
document.getElementById('btn-next').addEventListener('click', function() { if (current < total - 1) showSlide(current + 1); });
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { if (current < total - 1) showSlide(current + 1); }
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { if (current > 0) showSlide(current - 1); }
});

showSlide(0);
</script>
